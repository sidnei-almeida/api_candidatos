<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" role="img" aria-labelledby="pipe-title pipe-desc">
  <title id="pipe-title">API data flow</title>
  <desc id="pipe-desc">Sources, ingestion, cache, models, and REST endpoints.</desc>
  <defs>
    <linearGradient id="pipe-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <marker id="pipe-arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="880" height="320" rx="14" fill="url(#pipe-bg)" stroke="#cbd5e1"/>
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif">
    <rect x="40" y="48" width="170" height="90" rx="10" fill="#ffffff" stroke="#0071c5" stroke-width="1.5"/>
    <text x="125" y="82" text-anchor="middle" fill="#0f172a" font-size="15" font-weight="700">Sources</text>
    <text x="125" y="104" text-anchor="middle" fill="#475569" font-size="12">RSS / web</text>
    <text x="125" y="122" text-anchor="middle" fill="#475569" font-size="12">news_collector</text>
    <path d="M220 93 H250" stroke="#64748b" stroke-width="2" marker-end="url(#pipe-arrow)"/>
    <rect x="260" y="48" width="170" height="90" rx="10" fill="#ffffff" stroke="#0071c5" stroke-width="1.5"/>
    <text x="345" y="82" text-anchor="middle" fill="#0f172a" font-size="15" font-weight="700">Ingest</text>
    <text x="345" y="104" text-anchor="middle" fill="#475569" font-size="12">Classification</text>
    <text x="345" y="122" text-anchor="middle" fill="#475569" font-size="12">aspect + sentiment</text>
    <path d="M440 93 H470" stroke="#64748b" stroke-width="2" marker-end="url(#pipe-arrow)"/>
    <rect x="480" y="48" width="170" height="90" rx="10" fill="#ffffff" stroke="#0071c5" stroke-width="1.5"/>
    <text x="565" y="82" text-anchor="middle" fill="#0f172a" font-size="15" font-weight="700">Cache</text>
    <text x="565" y="108" text-anchor="middle" fill="#475569" font-size="12">data/noticias_cache.csv</text>
    <path d="M660 93 H690" stroke="#64748b" stroke-width="2" marker-end="url(#pipe-arrow)"/>
    <rect x="700" y="48" width="140" height="90" rx="10" fill="#0f172a" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="770" y="82" text-anchor="middle" fill="#f8fafc" font-size="15" font-weight="700">FastAPI</text>
    <text x="770" y="108" text-anchor="middle" fill="#94a3b8" font-size="12">main.py</text>
  </g>
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif">
    <rect x="40" y="170" width="240" height="100" rx="10" fill="#ffffff" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="160" y="200" text-anchor="middle" fill="#0f172a" font-size="14" font-weight="700">Models &amp; NLP</text>
    <text x="160" y="224" text-anchor="middle" fill="#475569" font-size="12">joblib (aspect / sentiment)</text>
    <text x="160" y="242" text-anchor="middle" fill="#475569" font-size="12">spaCy pt_core_news_lg, lexicon, rules</text>
    <rect x="310" y="170" width="240" height="100" rx="10" fill="#ffffff" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="430" y="200" text-anchor="middle" fill="#0f172a" font-size="14" font-weight="700">Auxiliary data</text>
    <text x="430" y="224" text-anchor="middle" fill="#475569" font-size="12">candidates, regions, aspects</text>
    <text x="430" y="242" text-anchor="middle" fill="#475569" font-size="12">JSON local or from GitHub</text>
    <rect x="580" y="170" width="260" height="100" rx="10" fill="#ffffff" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="710" y="200" text-anchor="middle" fill="#0f172a" font-size="14" font-weight="700">Clients</text>
    <text x="710" y="224" text-anchor="middle" fill="#475569" font-size="12">/docs, dashboards, filters</text>
    <text x="710" y="242" text-anchor="middle" fill="#475569" font-size="12">candidates, region, recommendations</text>
  </g>
  <path d="M125 138 V155" stroke="#64748b" stroke-width="2" marker-end="url(#pipe-arrow)"/>
  <path d="M345 138 V155" stroke="#64748b" stroke-width="2" marker-end="url(#pipe-arrow)"/>
  <path d="M565 138 V155" stroke="#64748b" stroke-width="2" marker-end="url(#pipe-arrow)"/>
  <path d="M770 138 V155" stroke="#64748b" stroke-width="2" marker-end="url(#pipe-arrow)"/>
  <text x="440" y="300" text-anchor="middle" fill="#64748b" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">Figure 1. Pipeline from ingestion to REST API consumption.</text>
</svg>
